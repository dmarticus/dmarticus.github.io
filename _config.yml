# standard jekyll config

permalink: date
highlighter: rouge
markdown: kramdown
github: [metadata]
exclude: ["README.md", "Gemfile", "Gemfile.lock"]
title: "Dylan Martin"
author: "Dylan"
description: "Compacted Context is the personal website of Dylan Martin, where I publish essays about software engineering, career reflections, or whatever else I'm thinking about, and digests of what I'm reading (or occasionally watching)."
url: "https://compactedcontext.com"
future: true

collections:
  digest:
    output: true

feed:
  collections:
    digest:
      path: "/digest.xml"
    posts:
      path: "/blog.xml"

repository: dmarticus/dmarticus.github.io
plugins:
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-analytics

Matomo:
  url: https://dylanamartin.matomo.cloud
  siteId: "1"
